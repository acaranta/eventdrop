<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up — EventDrop</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 80px auto; color: #333; }
        h1 { text-align: center; margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.25rem; font-weight: bold; }
        input[type=text], input[type=password], input[type=email] {
            width: 100%; padding: 0.5rem; margin-bottom: 1rem;
            border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box;
        }
        button { width: 100%; padding: 0.75rem; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        .error { color: #dc2626; margin-bottom: 1rem; text-align: center; }
        .links { text-align: center; margin-top: 1rem; }
        a { color: #2563eb; }
    </style>
</head>
<body>
    <h1>Sign up</h1>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="/auth/signup">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
        <label for="email">Email (optional)</label>
        <input type="email" id="email" name="email">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
        <button type="submit">Create account</button>
    </form>
    <div class="links">
        <a href="/auth/login">Already have an account? Log in</a>
    </div>
</body>
</html>
