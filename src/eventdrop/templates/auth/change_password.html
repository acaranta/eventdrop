{% extends "base.html" %}

{% block title %}{{ t("auth.change_password.title") }}{% endblock %}

{% block content %}
<div class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="text-center text-3xl font-bold tracking-tight text-gray-900 dark:text-gray-100">
            {{ t("auth.change_password.heading") }}
        </h2>
        <p class="mt-2 text-center text-sm text-gray-500 dark:text-gray-400">
            {{ t("auth.change_password.subtitle") }}
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white dark:bg-gray-800 py-8 px-4 shadow rounded-xl sm:px-10 border border-gray-200 dark:border-gray-700">

            {% if error_key %}
            <div class="mb-4 rounded-md bg-red-50 dark:bg-red-900/30 p-4 border border-red-300 dark:border-red-700">
                <p class="text-sm text-red-700 dark:text-red-300">{{ t(error_key) }}</p>
            </div>
            {% endif %}

            <form method="post" action="/auth/change-password" class="space-y-5">

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        {{ t("auth.change_password.new_password") }}
                    </label>
                    <div class="mt-1">
                        <input id="password" name="password" type="password" required autofocus
                               minlength="8"
                               class="block w-full appearance-none rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 placeholder-gray-400 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 dark:placeholder-gray-500"
                               placeholder="{{ t('auth.change_password.new_password_placeholder') }}">
                    </div>
                </div>

                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        {{ t("auth.change_password.confirm_password") }}
                    </label>
                    <div class="mt-1">
                        <input id="confirm_password" name="confirm_password" type="password" required
                               minlength="8"
                               class="block w-full appearance-none rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 placeholder-gray-400 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 dark:placeholder-gray-500"
                               placeholder="{{ t('auth.change_password.confirm_placeholder') }}">
                    </div>
                </div>

                <div>
                    <button type="submit"
                            class="flex w-full justify-center rounded-md border border-transparent bg-indigo-600 py-2.5 px-4 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors">
                        {{ t("auth.change_password.change_btn") }}
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock %}
