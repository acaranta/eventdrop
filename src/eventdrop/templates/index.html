<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventDrop — Share Event Memories</title>
    <style>
        body { font-family: sans-serif; max-width: 640px; margin: 80px auto; text-align: center; color: #333; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 2rem; }
        .btn { display: inline-block; padding: 0.75rem 1.5rem; border-radius: 6px; text-decoration: none; font-weight: bold; }
        .btn-primary { background: #2563eb; color: #fff; margin-right: 0.5rem; }
        .btn-secondary { background: #e5e7eb; color: #374151; }
    </style>
</head>
<body>
    <h1>EventDrop</h1>
    <p>Collect and share photos &amp; videos from your events — no account required for guests.</p>
    <a href="/auth/login" class="btn btn-primary">Log in</a>
    <a href="/auth/signup" class="btn btn-secondary">Sign up</a>
</body>
</html>
