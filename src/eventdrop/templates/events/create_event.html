{% extends "base.html" %}
{% block title %}Create Event — EventDrop{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-4">
        <a href="/events/" class="text-blue-600 dark:text-blue-400 hover:underline text-sm">&larr; My Events</a>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-6">Create New Event</h1>

    <form method="post" action="/events/create" class="space-y-6">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Event Name <span class="text-red-500">*</span></label>
            <input type="text" id="name" name="name" required
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="My Wedding, Conference 2025, etc.">
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
            <textarea id="description" name="description" rows="3"
                      class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500"
                      placeholder="Optional description..."></textarea>
        </div>

        <div class="space-y-3">
            <div class="flex items-center">
                <input type="checkbox" id="is_gallery_public" name="is_gallery_public" value="true"
                       class="h-4 w-4 text-blue-600 border-gray-300 dark:border-gray-600 rounded">
                <label for="is_gallery_public" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">Public gallery (anyone can view)</label>
            </div>
            <div class="flex items-center">
                <input type="checkbox" id="allow_public_download" name="allow_public_download" value="true"
                       class="h-4 w-4 text-blue-600 border-gray-300 dark:border-gray-600 rounded">
                <label for="allow_public_download" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">Allow public download</label>
            </div>
        </div>

        {% if settings.email_ingestion_enabled %}
        <div class="border border-gray-200 dark:border-gray-700 rounded-md p-4">
            <div class="flex items-center mb-3">
                <input type="checkbox" id="email_enabled" name="email_enabled" value="true"
                       class="h-4 w-4 text-blue-600 border-gray-300 dark:border-gray-600 rounded"
                       onchange="document.getElementById('email-config').classList.toggle('hidden', !this.checked)">
                <label for="email_enabled" class="ml-2 block text-sm font-medium text-gray-700 dark:text-gray-300">Enable email ingestion</label>
            </div>
            <div id="email-config" class="hidden space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Protocol</label>
                        <select name="email_protocol" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 text-sm">
                            <option value="imap">IMAP</option>
                            <option value="pop3">POP3</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Server Host</label>
                        <input type="text" name="email_server_host" placeholder="imap.example.com"
                               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Port</label>
                        <input type="number" name="email_server_port" placeholder="993"
                               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 text-sm">
                    </div>
                    <div class="flex items-end pb-2">
                        <input type="checkbox" id="email_use_ssl" name="email_use_ssl" value="true" checked
                               class="h-4 w-4 text-blue-600 border-gray-300 dark:border-gray-600 rounded">
                        <label for="email_use_ssl" class="ml-2 text-sm text-gray-700 dark:text-gray-300">Use SSL</label>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Username</label>
                    <input type="text" name="email_username" placeholder="user@example.com"
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Password</label>
                    <input type="password" name="email_password"
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Email Address (for display)</label>
                    <input type="email" name="email_address" placeholder="Leave blank to use username"
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 text-sm">
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="email_delete_after" name="email_delete_after" value="true"
                           class="h-4 w-4 text-blue-600 border-gray-300 dark:border-gray-600 rounded">
                    <label for="email_delete_after" class="ml-2 text-sm text-gray-700 dark:text-gray-300">Delete emails after ingestion</label>
                </div>
            </div>
        </div>
        {% endif %}

        <div class="flex gap-3">
            <button type="submit" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md transition-colors">
                Create Event
            </button>
            <a href="/events/" class="px-6 py-2 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 font-medium rounded-md transition-colors">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
